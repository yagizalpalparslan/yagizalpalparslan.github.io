<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Üst Menü Tasarımı */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            font-size: 13px;
        }
        .navbar a {
            color: #888888;
            text-decoration: none;
            text-transform: capitalize;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #ffffff;
        }
        .navbar a.active {
            color: #ffffff;
            font-weight: bold;
        }

        /* Geri Butonu */
        .back-btn {
            position: absolute;
            top: 70px;
            left: 50px;
            background-color: #ffffff;
            color: #000000;
            padding: 12px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        .back-btn:hover {
            transform: scale(1.05);
        }

        /* Ana Başlık */
        .header-title {
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 4.5rem;
            font-weight: normal;
            margin-top: 100px;
            margin-bottom: 80px;
            letter-spacing: -1px;
        }

        /* Kartların Izgara Sistemi */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            padding: 0 50px 100px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Beyaz Proje Kartları */
        .project-card {
            background-color: #ffffff;
            color: #000000;
            border-radius: 40px;
            padding: 40px 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.1);
        }

        /* Kart İçindeki Yazılar */
        .project-card h3 {
            font-family: 'Georgia', serif;
            font-style: italic;
            text-decoration: underline;
            font-size: 1.8rem;
            text-align: center;
            margin: 0;
            line-height: 1.4;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header-title {
                font-size: 3rem;
            }
            .back-btn {
                position: relative;
                display: inline-block;
                top: 0;
                left: 0;
                margin: 20px 0 0 50px;
            }
        }
        @media (max-width: 600px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            .navbar {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#">Main</a>
        <a href="#">About Me</a>
        <a href="#" class="active">Projects</a>
        <a href="#">Contact</a>

        <a href="#">Project2</a>
        <a href="#">Project3</a>
    </div>

    <a href="#" class="back-btn">BACK</a>

    <div class="projects-grid">
        
        <a href="YOUTUBE_LİNKİNİ_BURAYA_YAPIŞTIRIN" target="_blank" class="project-card">

        </a>

        <a href="YOUTUBE_LİNKİNİ_BURAYA_YAPIŞTIRIN" target="_blank" class="project-card">
            <h3>Gofretmarket<br>Mobile Demo</h3>
        </a>

        <a href="YOUTUBE_LİNKİNİ_BURAYA_YAPIŞTIRIN" target="_blank" class="project-card">
            <h3>Blender 3D<br>Environment Renders</h3>
        </a>

        <a href="YOUTUBE_LİNKİNİ_BURAYA_YAPIŞTIRIN" target="_blank" class="project-card">
            <h3>Unreal Engine 5.3<br>AI & Mechanics</h3>
        </a>

        <a href="YOUTUBE_LİNKİNİ_BURAYA_YAPIŞTIRIN" target="_blank" class="project-card">
            <h3>Game Data Analysis<br>Demo</h3>
        </a>

        <a href="YOUTUBE_LİNKİNİ_BURAYA_YAPIŞTIRIN" target="_blank" class="project-card">

</body>
</html>
